services:
  - type: web
    name: vehicle-rental
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "604800000"
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads

disks:
  - name: vehicle-rental-data
    mountPath: /var/data
    sizeGB: 1
