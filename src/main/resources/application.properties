# Load local .env (key=value) if present
spring.config.import=optional:file:.env[.properties]

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vehicle_rental_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=8080

# App name
spring.application.name=vehicle-rental

# JWT secret (we'll use this later)
jwt.secret=${JWT_SECRET:ChangeThisJwtSecretBeforeProduction1234567890}
jwt.expiration=${JWT_EXPIRATION:604800000}
# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=src/main/resources/static/uploads

# Gmail SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:example@example.com}
spring.mail.password=${MAIL_PASSWORD:change_me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App base URL (for email links)
app.base.url=${APP_BASE_URL:http://localhost:8080}
